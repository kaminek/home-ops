---
os_packages:
  - hdparm
  - htop
  - socat
  - python3-pip
  - python3-yaml
  - python3-netaddr
  - python3-kubernetes
  - python3-selinux
# os hardening
os_selinux_state: permissive
os_selinux_policy: targeted
ufw_manage_defaults: false
os_rhosts_enabled: false
hidepid_option: 0
# allow packet forwarding (k3s/cilium + tailscale exit nodes need it);
# os_hardening defaults both to 0, which overrides /etc/sysctl.d on boot
sysctl_overwrite:
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1
# ssh hardening
network_ipv6_enable: false
ssh_permit_root_login: "yes"
